services:

  # ── INFRASTRUCTURE ──────────────────────────────────────────────────────────

  postgres-write:
    image: postgres:16-alpine
    container_name: postgres-write
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: root
      POSTGRES_DB: food_write
    ports:
      - "5432:5432"
    volumes:
      - pg_write_data:/var/lib/postgresql/data
      - ./init/write-db.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d write_db"]
      interval: 5s
      timeout: 5s
      retries: 15

  postgres-read:
    image: postgres:16-alpine
    container_name: postgres-read
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: root
      POSTGRES_DB: food_read
    ports:
      - "5433:5432"
    volumes:
      - pg_read_data:/var/lib/postgresql/data
      - ./init/read-db.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d food_read"]
      interval: 5s
      timeout: 5s
      retries: 15

  kafka:
    image: apache/kafka:latest
    container_name: kafka-broker
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka-broker:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@172.31.253.3:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      CLUSTER_ID: 'MkU3OEVBNTcwNTJENDM2Qk'
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server 172.31.253.3:9092 --list > /dev/null 2>&1"]
      interval: 10s
      timeout: 10s
      retries: 15

  # ── APPLICATION LAYER ────────────────────────────────────────────────────────

  write-api:
    image: local/write-api:latest
    container_name: write-api
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: "postgres://postgres:root@postgres-write:5432/food_write?sslmode=disable"
      KAFKA_BROKER: "kafka-broker:9092"
    depends_on:
      postgres-write:
        condition: service_healthy
      kafka:
        condition: service_healthy

  read-api:
    image: local/read-api:latest
    container_name: read-api
    ports:
      - "8081:8081"
    environment:
      DATABASE_URL: "postgres://postgres:root@postgres-read:5432/food_read?sslmode=disable"
    depends_on:
      postgres-read:
        condition: service_healthy

  sync-worker:
    image: local/sync-worker:latest
    container_name: sync-worker
    environment:
      DATABASE_URL: "postgres://postgres:root@postgres-read:5432/food_read?sslmode=disable"
      KAFKA_BROKER: "kafka-broker:9092"
    depends_on:
      postgres-read:
        condition: service_healthy
      kafka:
        condition: service_healthy

volumes:
  pg_write_data:
  pg_read_data:
  kafka_data:
